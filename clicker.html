<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кликер</title>
</head>
<body>
 
    <div id="startScreen" class="noselect">
        <input type="text" id="nameInput" placeholder="Введите ваше имя">
        <button id="submitName">Начать</button>
    </div>
    <div id="titleDisplay" class="noselect">Новичок</div>
    <h1 id="nameGame">RampleClicker</h1>
    <audio id="myAudio" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/1120/1120-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="myAudio2" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2575/2575-preview.mp3" type="audio/mpeg">
    </audio>
    <div id="clickArea" class="noselect">
        0
    </div>
    <div class="progressBar">
        <div class="progressBarFill" id="progressFill"></div>
        <div class="progressBarText" id="progressText">0%</div>
    </div>
    
<style>
            .noselect {
  -webkit-touch-callout: none; /* iOS Safari */
    -webkit-user-select: none; /* Safari */
     -khtml-user-select: none; /* Konqueror HTML */
       -moz-user-select: none; /* Old versions of Firefox */
        -ms-user-select: none; /* Internet Explorer/Edge */
            user-select: none; /* Non-prefixed version, currently
                                  supported by Chrome, Edge, Opera and Firefox */
}
        #nameGame{
            filter: drop-shadow(0 0 40px #555);
            position: relative;
            bottom:100px;
            font-family: "MultiRound Pro";
        }
        body {
            filter: drop-shadow(0 0 40px #555);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            flex-direction: column;
            overflow: hidden;
            -webkit-touch-callout: none; /* iOS Safari */
    -webkit-user-select: none; /* Safari */
     -khtml-user-select: none; /* Konqueror HTML */
       -moz-user-select: none; /* Old versions of Firefox */
        -ms-user-select: none; /* Internet Explorer/Edge */
            user-select: none; /* Non-prefixed version, currently
                                  supported by Chrome, Edge, Opera and Firefox */
        }
        #startScreen, #mainScreen {
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100%;
        }
        #titleDisplay{
            position: relative;
            bottom: 20px;
            font-family: "MultiRound Pro";
        }
        #nameInput {
            padding: 15px 30px;
            font-size: 24px;
            border: none;
            border-radius: 5px;
            margin-bottom: 20px;
            background-color: #282828;
            color: white;
        }
        .animation {
    font-size: 2em;
    color: rgb(255, 255, 255);
    pointer-events: none; /* Чтобы не мешало кликам */
    transition: transform 0.5s ease, opacity 0.5s ease;
    position: absolute;
    font-family: "MultiRound Pro";
}

        #clickArea {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: #007bff;
            position: relative;
            font-size: 24px;
            color: white;
            text-align: center;
            line-height: 200px;
            user-select: none;
            transition: 0.3s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* Убираем синюю зону в Chrome и Safari */
            font-family: "MultiRound Pro";
        }
        #clickArea:hover {
            background-color: #278fff;
            box-shadow: 0 0 20px rgb(86, 97, 255);
        }
        #clickArea:active {
          transform: scale(1.1);
        }
        @font-face {
	font-family: 'Multiround Pro'; 
	src: url("/Multiround Pro.otf");
}
        .progressBar {
            width: 100%;
            height: 10px;
            background-color: #333;
            border-radius: 5px;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            position: relative;
            bottom: -20px;
        }
        .progressBarFill {
            height: 100%;
            background-color: #007bff;
            width: 0%;
            border-radius: 5px;
            transition: width 0.5s ease;
        }
</style>

<script>

let count = 0;
const audio = document.getElementById('myAudio');
const clickArea = document.getElementById('clickArea');
const nameInput = document.getElementById('nameInput');
const submitNameButton = document.getElementById('submitName');
const audio2 = document.getElementById('myAudio2');

// Проверка имени в localStorage при загрузке страницы
window.onload = () => {
    const username = localStorage.getItem('userName');
    if (username) {
        loadClicks(username);
        document.getElementById('startScreen').style.display = 'none';
        clickArea.style.display = 'block';
        document.querySelector('.progressBar').style.display = 'block'; 
    }
};

submitNameButton.addEventListener('click', () => {
    const username = nameInput.value.trim();
    if (username) {
        localStorage.setItem('userName', username); // Сохраняем имя пользователя
        loadClicks(username);
        document.getElementById('startScreen').style.display = 'none';
        clickArea.style.display = 'block';
        document.querySelector('.progressBar').style.display = 'block'; 
    } else {
        alert('Пожалуйста, введите ваше имя!');
    }
});

function loadClicks() {
    const username = localStorage.getItem('userName'); // Получаем имя пользователя
    const savedClicks = localStorage.getItem(username); // Загружаем количество кликов по имени
    count = savedClicks ? parseInt(savedClicks) : 0; // Если есть сохраненные клики, загружаем их
    updateDisplay(); // Обновляем отображение
}

function saveClicks(username) {
    localStorage.setItem(username, count); // Сохраняем клики по имени
}

let previousTitle = ''; // Переменная для хранения предыдущего звания

function incrementAndPlaySound() {
    count + 1;
    const username = localStorage.getItem('userName'); // Получаем имя пользователя
    audio.currentTime = 0; 
    audio.play().catch(error => console.error("Ошибка воспроизведения:", error));
    saveClicks(username); // Сохраняем клики
    updateDisplay(); // Обновляем отображение
}

function updateDisplay() {
    clickArea.textContent = count;
    let title = '';
    let nextLevelThreshold;

    // Определение текущего звания и порога для следующего уровня
    if (count < 100) {
        title = 'Вы Новичок';
        nextLevelThreshold = 100;
        
    } else if (count < 500) {
        title = 'Вы Хороший игрок';
        nextLevelThreshold = 500;
    } else if (count < 1000) {
        title = 'Вы Опытный игрок';
        nextLevelThreshold = 1000;
    } else if (count < 1500) {
        title = 'Вы Мастер';
        nextLevelThreshold = 1500;
    } else {
        title = 'Вы Миллиардер';
        nextLevelThreshold = Math.floor(count / 100) * 100 + 100; // Каждые 100 снизу
    }

    // Проверяем, изменилось ли звание
    if (title !== previousTitle) {
        // Если звание изменилось, воспроизводим звук
        audio2.currentTime = 0; 
        audio2.play().catch(error => console.error("Ошибка воспроизведения:", error));
        previousTitle = title; // Обновляем предыдущее звание
    }

    // Вычисляем заполняемость прогресс-бара
    const progressValue = Math.min((count / nextLevelThreshold) * 100, 100); // Процентное соотношение

    // Обновляем прогресс-бар
    document.getElementById('progressFill').style.width = progressValue + '%';
    document.getElementById('progressText').textContent = Math.floor(progressValue) + '%';
    
    // Отображаем звание
    document.getElementById('titleDisplay').textContent = title;
}

// Вызываем loadClicks при загрузке страницы
window.onload = function() {
    loadClicks();
};



// Обработчик клика по области
clickArea.addEventListener('click', (e) => {
    count++; // Увеличиваем количество тапов
    incrementAndPlaySound(); // Вызываем функцию по увеличению и воспроизведению звука
    createAnimation(e.clientX, e.clientY); // Создаем анимацию
});

function createAnimation(x, y) {
    const plusOne = document.createElement('div');
    plusOne.className = 'animation';
    plusOne.innerText = '+1';
    plusOne.style.position = 'absolute';
    plusOne.style.left = x + 'px';
    plusOne.style.top = y + 'px';
    document.body.appendChild(plusOne);

    setTimeout(() => {
        plusOne.style.transform = 'translateY(-50px)';
        plusOne.style.opacity = '0';
    }, 10);
    setTimeout(() => {
        plusOne.remove();
    }, 500);
}

</script>

</body>
</html>
